# ============================================================
# Event Horizon — Local Development with Docker
# Usage: docker compose up --build
# ============================================================

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Mount generated data files so they persist across rebuilds
      # You must run data_prep.py and generate_embeddings.py first
      - ./backend/database_clean.json:/app/database_clean.json:ro
      - ./backend/vibe_index.faiss:/app/vibe_index.faiss:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
